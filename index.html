<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hour Mosaic</title>
    <link rel="stylesheet" href="/src/theme/tokens.css" />
    <link rel="stylesheet" href="/src/main.css" />
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body class="window window--main">
    <header id="status-bar" class="status-bar">
      <button id="hamburger" class="hamburger" type="button" aria-label="Menu">⋮</button>
      <span id="ticker" class="ticker" aria-live="polite"></span>
      <button id="copy-status" class="status-copy" type="button" aria-label="Copy status / error" title="Copy status / error to clipboard">⧉</button>
      <span class="win-controls">
        <button id="win-min" class="win-btn" type="button" aria-label="Minimize" title="Minimize">—</button>
        <button id="win-max" class="win-btn" type="button" aria-label="Maximize" title="Maximize">▢</button>
        <button id="win-close" class="win-btn win-btn--close" type="button" aria-label="Quit" title="Quit">✕</button>
      </span>
    </header>
    <div class="mosaic-host">
      <canvas id="mosaic" class="mosaic"></canvas>
    </div>
  </body>
</html>
